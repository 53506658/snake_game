name: snake_game
description: Final Stable Build - Snake IO Pro (No Ads Version).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # مكتبات لوحة الصدارة وقاعدة البيانات
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2

  # مكتبة حفظ العملات والإعدادات
  shared_preferences: ^2.2.3

  # مكتبة الأصوات والموسيقى
  audioplayers: ^5.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # أداة توليد الأيقونات
  flutter_launcher_icons: ^0.13.1

# --- إعدادات أيقونة التطبيق ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/game_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # --- تعريف كافة المواد (Assets) ---
  assets:
    - assets/head.png
    - assets/body.png
    - assets/tail.png
    - assets/forest.png
    - assets/desert.jpg
    - assets/snow.jpg
    - assets/icon/game_icon.png
    - assets/audio/music.mp3
    - assets/audio/eat.mp3
    - assets/audio/die.wav
