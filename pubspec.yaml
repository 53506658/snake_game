name: snake_game
description: Snake IO Pro with Google Ads only for maximum stability.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # إعلانات جوجل فقط
  google_mobile_ads: ^5.1.0 
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.3
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/head.png
    - assets/body.png
    - assets/tail.png
    - assets/audio/music.mp3
    - assets/audio/eat.mp3
    - assets/audio/die.wav
