name: snake_game
description: A professional Snake IO project with Dual Ads, Leaderboard, and Clean Camera.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # الإعلانات
  google_mobile_ads: ^5.1.0
  yandex_mobileads: 7.11.0 # إصدار مستقر لضمان نجاح البناء

  # الصوت
  audioplayers: ^5.2.1

  # تخزين البيانات
  shared_preferences: ^2.2.3

  # لوحة الصدارة
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2

  # أيقونات
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/game_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/head.png
    - assets/body.png
    - assets/tail.png
    - assets/forest.png
    - assets/desert.jpg
    - assets/snow.jpg
    - assets/icon/game_icon.png
    - assets/audio/music.mp3
    - assets/audio/eat.mp3
    - assets/audio/die.wav
