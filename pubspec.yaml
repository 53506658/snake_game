name: snake_game
description: Final Master Version - Snake IO Pro.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # الإعلانات (إصدارات مستقرة ومتوافقة)
  google_mobile_ads: ^5.1.0
  yandex_mobileads: ^7.0.0

  # الصوت وتخزين البيانات
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.3

  # لوحة الصدارة العالمية (Firebase)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/game_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/head.png
    - assets/body.png
    - assets/tail.png
    - assets/forest.png
    - assets/desert.jpg
    - assets/snow.jpg
    - assets/icon/game_icon.png
    - assets/audio/music.mp3
    - assets/audio/eat.mp3
    - assets/audio/die.wav
