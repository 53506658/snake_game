def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream ->
        localProperties.load(stream)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
// تفعيل لغة Kotlin
apply plugin: 'kotlin-android'
// تفعيل خدمات جوجل (ضروري للـ Firebase ولوحة الصدارة)
apply plugin: 'com.google.gms.google-services'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.example.snake_game" // تأكد أن هذا يطابق معرف تطبيقك
    compileSdkVersion 34 // تحديث لضمان التوافق مع المكتبات الجديدة

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.snake_game" // معرف التطبيق الخاص بك
        // مكتبات الإعلانات والـ Firebase تتطلب على الأقل 21 ويفضل 23
        minSdkVersion 23 
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // تفعيل Multidex لمنع خطأ الـ 64k method limit بسبب كثرة المكتبات
        multiDexEnabled true
    }

    buildTypes {
        release {
            // يمكنك إضافة إعدادات التوقيع هنا (Signing Config)
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    
    // دعم Multidex
    implementation 'com.android.support:multidex:1.0.3'
    
    // تأكد من إضافة مكتبات Firebase و Ads هنا إذا لم تكن مضافة تلقائياً عبر Flutter
    implementation platform('com.google.firebase:firebase-bom:32.2.0')
    implementation 'com.google.firebase:firebase-analytics'
}
