plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // السطر المطلوب لحل مشكلة التحذير في GitHub
    ndkVersion = "28.2.13676358" 

    namespace = "com.example.snake_game"
    compileSdk = flutter.compileSdkVersion

    defaultConfig {
        // يجب أن يطابق هذا الاسم ما هو موجود في Firebase
        applicationId = "com.example.snake_game" 
        
        minSdk = 21
        targetSdk = flutter.targetSdkVersion
        versionCode = 1
        versionName = "1.0.0"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            shrinkResources = false
            minifyEnabled = false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // تأكد من وجود مكتبة خدمات جوجل لعمل الفايربيس والإعلانات
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics'
}
